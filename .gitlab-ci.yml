stages:
  - lint
  - test
  - build
  - security
  - deploy

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# Cache de dependências pip
cache:
  key:
    files:
      - requirements.txt
  paths:
    - .cache/pip

lint:
  stage: lint
  image: python:3.12-alpine
  before_script:
    - pip install --quiet flake8
  script:
    - flake8 app.py test_app.py --max-line-length 88 --statistics

test:
  stage: test
  image: python:3.12-alpine
  before_script:
    - pip install --quiet -r requirements.txt
  script:
    - pytest test_app.py -v --tb=short --junitxml=report.xml
  artifacts:
    when: always
    reports:
      junit: report.xml
    expire_in: 1 week

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - export DOCKER_BUILDKIT=1
    - docker pull "$IMAGE_LATEST" || true
    - docker build
        --cache-from "$IMAGE_LATEST"
        --tag "$IMAGE_TAG"
        --tag "$IMAGE_LATEST"
        .
    - docker push "$IMAGE_TAG"
    - docker push "$IMAGE_LATEST"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# BÔNUS: Security scan com Trivy
security:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  variables:
    TRIVY_CACHE_DIR: .trivycache
  cache:
    key: trivy-db
    paths:
      - .trivycache/
  script:
    - trivy image
        --exit-code 1
        --severity CRITICAL
        --ignore-unfixed
        --no-progress
        --format table
        "$IMAGE_TAG"
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy:
  stage: deploy
  image: alpine:3.19
  script:
    - echo "=== SIMULAÇÃO DE DEPLOY AWS ECS ==="
    - echo "Imagem: $IMAGE_TAG"
    - echo ""
    - echo "[1/3] Registrando nova Task Definition..."
    - |
      echo "aws ecs register-task-definition \
        --family trainee-devops-api \
        --container-definitions '[{\"name\":\"api\",\"image\":\"$IMAGE_TAG\",\"portMappings\":[{\"containerPort\":5000}]}]'"
    - echo "[2/3] Atualizando serviço ECS..."
    - |
      echo "aws ecs update-service \
        --cluster trainee-cluster \
        --service trainee-devops-api \
        --task-definition trainee-devops-api \
        --force-new-deployment"
    - echo "[3/3] Aguardando estabilização..."
    - echo "aws ecs wait services-stable --cluster trainee-cluster --services trainee-devops-api"
    - echo ""
    - echo "Deploy simulado! Commit: $CI_COMMIT_SHA"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
