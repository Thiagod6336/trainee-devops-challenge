version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trainee-devops-api
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider",
             "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
